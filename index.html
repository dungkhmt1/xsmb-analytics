<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#b91c1c">

  <title>XSMB Analytics</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,500,1,0"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
</head>

<body>

<header class="app-header">

  <div class="header-main">

    <div class="brand">

      <div class="brand-icon">
        <span class="material-symbols-rounded">
          monitoring
        </span>
      </div>

      <div>
        <div class="brand-title">
          XSMB <span>Analytics</span>
        </div>

        <div class="brand-subtitle">
          Phân tích dữ liệu miền Bắc
        </div>
      </div>

    </div>

    <div class="header-status">

      <span class="status-dot"></span>

      <span id="header-total-draws">
        -- kỳ
      </span>

    </div>

  </div>

</header>


<main class="app-container">

  <!-- KẾT QUẢ -->

  <section class="card">

    <div class="card-header">

      <div>
        <div class="section-label">
          KẾT QUẢ
        </div>

        <h2>
          XSMB mới nhất
        </h2>
      </div>

      <div
        id="latest-date-badge"
        class="date-chip"
      >
        --/--/----
      </div>

    </div>

    <div id="latest-result">

      <div class="skeleton-box">
        Đang tải kết quả...
      </div>

    </div>

  </section>


  <!-- DỰ ĐOÁN -->

  <section class="card hot-card">

    <div class="card-header">

      <div>
        <div class="section-label">
          PHÂN TÍCH HÔM NAY
        </div>

        <h2>
          Dàn số gợi ý
        </h2>
      </div>

      <span class="hot-chip">
        HOT
      </span>

    </div>

    <div id="today-prediction">

      <div class="skeleton-box">
        Đang phân tích...
      </div>

    </div>

  </section>


  <!-- TOP MODEL -->

  <section class="card">

    <div class="card-header">

      <div>
        <div class="section-label">
          XẾP HẠNG
        </div>

        <h2>
          Top số theo mô hình
        </h2>
      </div>

      <button
        id="analyze-button"
        class="icon-button"
        onclick="refreshAnalysis()"
        aria-label="Làm mới"
      >
        <span class="material-symbols-rounded">
          refresh
        </span>
      </button>

    </div>

    <div
      id="system-status"
      class="system-status"
    >
      Đang kết nối dữ liệu...
    </div>

    <div id="analysis-detail"></div>

  </section>


  <!-- TRACKING -->

  <section
    class="card"
    id="tracking-section"
    style="display:none;"
  >

    <div class="card-header">

      <div>
        <div class="section-label">
          HIỆU QUẢ
        </div>

        <h2>
          Theo dõi dự đoán
        </h2>
      </div>

      <span class="material-symbols-rounded tracking-icon">
        payments
      </span>

    </div>

    <div id="tracking-summary"></div>

    <div id="tracking-table"></div>

  </section>

</main>


<nav class="bottom-nav">

  <button
    class="nav-item active"
    onclick="showPrediction()"
  >
    <span class="material-symbols-rounded">
      home
    </span>

    <span>
      Hôm nay
    </span>
  </button>


  <button
    class="nav-item"
    onclick="showStatistics()"
  >
    <span class="material-symbols-rounded">
      query_stats
    </span>

    <span>
      Thống kê
    </span>
  </button>


  <button
    class="nav-item"
    onclick="showTracking()"
  >
    <span class="material-symbols-rounded">
      paid
    </span>

    <span>
      Theo dõi
    </span>
  </button>


  <button
    class="nav-item"
    onclick="showBacktest()"
  >
    <span class="material-symbols-rounded">
      experiment
    </span>

    <span>
      Backtest
    </span>
  </button>

</nav>


<script src="/app.js"></script>

</body>
</html>
