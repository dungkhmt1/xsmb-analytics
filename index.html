<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">

  <title>XSMB Analytics</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<header>
  <h1>XSMB Analytics</h1>
  <p>Phân tích và thống kê XSMB</p>
</header>

<main>

  <!-- KẾT QUẢ MỚI NHẤT -->
  <section class="card">

    <h2>Kết quả mới nhất</h2>

    <div id="latest-result">
      Đang tải dữ liệu...
    </div>

  </section>


  <!-- CẦU HÔM NAY -->
  <section class="card">

    <h2>Cầu hôm nay</h2>

    <div id="today-prediction">
      Đang phân tích...
    </div>

  </section>


  <!-- PHÂN TÍCH -->
  <section class="card">

    <h2>Phân tích</h2>

    <button
      id="analyze-button"
      onclick="refreshAnalysis()"
    >
      Phân tích hôm nay
    </button>

    <div id="system-status">
      Đang kết nối cơ sở dữ liệu...
    </div>

    <div id="analysis-detail"></div>

  </section>


  <!-- MENU -->
  <section class="menu">

    <button onclick="showStatistics()">
      Thống kê
    </button>

    <button onclick="showPrediction()">
      Cầu hôm nay
    </button>

    <button onclick="showBacktest()">
      Backtest
    </button>

    <button onclick="showHistory()">
      Lịch sử
    </button>

  </section>

</main>

<script src="/app.js"></script>

</body>
</html>
